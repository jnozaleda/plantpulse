<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌱 PlantPulse</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 12px;
  }
  h1 { font-size: 1.2rem; color: #94a3b8; font-weight: 400; margin-bottom: 4px; }

  .offline-banner {
    background: #7f1d1d;
    border: 1px solid #ef4444;
    border-radius: 12px;
    padding: 12px 20px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    display: none;
  }
  .offline-title { color: #fca5a5; font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
  .offline-sub { color: #fca5a5; font-size: 0.8rem; opacity: 0.85; }

  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 18px 20px;
    width: 100%;
    max-width: 360px;
    transition: opacity 0.3s;
  }
  .card.offline { opacity: 0.45; }
  .card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .plant-name { font-size: 0.9rem; color: #94a3b8; }
  .last-reading { font-size: 0.75rem; color: #475569; }
  .humidity { font-size: 3rem; font-weight: 800; line-height: 1; margin-bottom: 6px; }
  .unit { font-size: 1.5rem; font-weight: 400; }
  .bar-wrap { background: #334155; border-radius: 6px; height: 8px; margin: 8px 0; overflow: hidden; }
  .bar { height: 100%; border-radius: 6px; transition: width 0.5s, background 0.5s; }
  .estado { font-size: 0.9rem; font-weight: 700; }

  .chart-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 360px;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chart-title { color: #94a3b8; font-size: 0.85rem; }
  .range-buttons { display: flex; gap: 4px; }
  .range-btn {
    background: #334155;
    border: none;
    color: #94a3b8;
    padding: 5px 9px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .range-btn.active { background: #22c55e; color: #0f172a; font-weight: 700; }
  .range-btn:hover:not(.active) { background: #475569; color: #f1f5f9; }

  .debug-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 14px 20px;
    width: 100%;
    max-width: 360px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  #debugLabel { color: #94a3b8; font-size: 0.8rem; }
  #debugBtn {
    background: #334155;
    border: none;
    color: #f1f5f9;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  #debugBtn.active { background: #f97316; color: white; }
  .footer { color: #475569; font-size: 0.7rem; }
</style>
</head>
<body>

<h1>🌱 PlantPulse</h1>

<div class="offline-banner" id="offlineBanner">
  <div class="offline-title">⚠️ Sin conexión</div>
  <div class="offline-sub" id="offlineSub"></div>
</div>

<div class="card" id="card0">
  <div class="card-header">
    <div class="plant-name">Olivo</div>
    <div class="last-reading" id="time0"></div>
  </div>
  <div class="humidity" id="hum0" style="color:#22c55e">--<span class="unit">%</span></div>
  <div class="bar-wrap"><div class="bar" id="bar0"></div></div>
  <div class="estado" id="est0">Cargando...</div>
</div>

<div class="card" id="card1">
  <div class="card-header">
    <div class="plant-name">Limonero</div>
    <div class="last-reading" id="time1"></div>
  </div>
  <div class="humidity" id="hum1" style="color:#eab308">--<span class="unit">%</span></div>
  <div class="bar-wrap"><div class="bar" id="bar1"></div></div>
  <div class="estado" id="est1">Cargando...</div>
</div>

<div class="card" id="card2">
  <div class="card-header">
    <div class="plant-name">Plumaria</div>
    <div class="last-reading" id="time2"></div>
  </div>
  <div class="humidity" id="hum2" style="color:#f97316">--<span class="unit">%</span></div>
  <div class="bar-wrap"><div class="bar" id="bar2"></div></div>
  <div class="estado" id="est2">Cargando...</div>
</div>

<div class="chart-card">
  <div class="chart-header">
    <div class="chart-title">Historial</div>
    <div class="range-buttons">
      <button class="range-btn active" data-key="20u" onclick="setRange(this)">Reciente</button>
      <button class="range-btn" data-key="1h"  onclick="setRange(this)">1h</button>
      <button class="range-btn" data-key="6h"  onclick="setRange(this)">6h</button>
      <button class="range-btn" data-key="24h" onclick="setRange(this)">24h</button>
      <button class="range-btn" data-key="7d"  onclick="setRange(this)">7d</button>
    </div>
  </div>
  <canvas id="chart"></canvas>
</div>

<div class="debug-card" id="debugCard">
  <span id="debugLabel">Modo normal · medición cada 5 min</span>
  <button id="debugBtn" onclick="toggleDebug()">Activar debug</button>
</div>

<div class="footer" id="footer"></div>

<script>
const CHANNEL  = 3420763;
const CONTROL_CHANNEL = 3426887;
const CONTROL_KEY = 'Q5ZFNBW13JN02Y21';
const OFFLINE_MS = 10 * 60 * 1000;
const PLANTAS  = [
  { nombre: 'Olivo',    color: '#22c55e', field: 'field1' },
  { nombre: 'Limonero', color: '#eab308', field: 'field2' },
  { nombre: 'Plumaria', color: '#f97316', field: 'field3' },
];
let chartInstance = null;
let currentKey = '20u';

function utcStr(msBack) {
  return new Date(Date.now() - msBack).toISOString().slice(0, 19).replace('T', '%20');
}
const RANGES = {
  '20u': () => 'results=20',
  '1h':  () => `start=${utcStr(1*3600*1000)}&results=8000`,
  '6h':  () => `start=${utcStr(6*3600*1000)}&results=8000`,
  '24h': () => `start=${utcStr(24*3600*1000)}&results=8000`,
  '7d':  () => `start=${utcStr(7*24*3600*1000)}&results=8000`,
};

function getEstado(h) {
  if (h < 20) return { texto: 'Necesita agua', color: '#ef4444' };
  if (h > 85) return { texto: 'Exceso de agua', color: '#3b82f6' };
  return { texto: 'Bien', color: PLANTAS.find(p => true)?.color }; // overridden below
}
function getEstadoColor(h, color) {
  if (h < 20) return { texto: 'Necesita agua', color: '#ef4444' };
  if (h > 85) return { texto: 'Exceso de agua', color: '#3b82f6' };
  return { texto: 'Bien', color };
}

function tiempoRelativo(fecha) {
  const diff = Date.now() - fecha.getTime();
  const mins = Math.floor(diff / 60000);
  const horas = Math.floor(diff / 3600000);
  const dias = Math.floor(diff / 86400000);
  if (mins < 1) return 'ahora';
  if (mins < 60) return `hace ${mins}m`;
  if (horas < 24) return `hace ${horas}h`;
  return `hace ${dias}d`;
}

function labelFecha(isoStr) {
  const d = new Date(isoStr);
  if (currentKey === '7d') return d.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' });
  return d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function setRange(btn) {
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentKey = btn.dataset.key;
  actualizar();
}

async function actualizar() {
  try {
    const param = RANGES[currentKey]();
    const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL}/feeds.json?${param}`);
    const data = await res.json();
    const feeds = data.feeds.filter(f => f.field1 || f.field2 || f.field3);
    if (!feeds.length) return;

    const ultimaFecha = new Date(feeds[feeds.length - 1].created_at);
    const offline = (Date.now() - ultimaFecha.getTime()) > OFFLINE_MS;

    // Banner offline
    const banner = document.getElementById('offlineBanner');
    if (offline) {
      banner.style.display = 'block';
      document.getElementById('offlineSub').textContent =
        `Última lectura ${tiempoRelativo(ultimaFecha)} — puede que el ESP32 esté apagado`;
    } else {
      banner.style.display = 'none';
    }

    // Cards
    PLANTAS.forEach((planta, i) => {
      const val = parseFloat(feeds[feeds.length - 1][planta.field]);
      if (isNaN(val)) return;
      const { texto, color } = getEstadoColor(val, planta.color);

      document.getElementById(`hum${i}`).innerHTML = `${val.toFixed(1)}<span class="unit">%</span>`;
      document.getElementById(`hum${i}`).style.color = color;
      document.getElementById(`bar${i}`).style.width = `${val}%`;
      document.getElementById(`bar${i}`).style.background = color;
      document.getElementById(`est${i}`).textContent = texto;
      document.getElementById(`est${i}`).style.color = color;
      document.getElementById(`time${i}`).textContent = tiempoRelativo(ultimaFecha);
      document.getElementById(`card${i}`).classList.toggle('offline', offline);
    });

    // Chart
    const labels = feeds.map(f => labelFecha(f.created_at));
    const muchosPuntos = feeds.length > 100;

    if (chartInstance) {
      chartInstance.data.labels = labels;
      PLANTAS.forEach((planta, i) => {
        chartInstance.data.datasets[i].data = feeds.map(f => parseFloat(f[planta.field]) || null);
        chartInstance.data.datasets[i].pointRadius = muchosPuntos ? 0 : 2;
      });
      chartInstance.update();
    } else {
      chartInstance = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          labels,
          datasets: PLANTAS.map(planta => ({
            label: planta.nombre,
            data: feeds.map(f => parseFloat(f[planta.field]) || null),
            borderColor: planta.color,
            backgroundColor: planta.color + '22',
            fill: false,
            tension: 0.4,
            pointRadius: muchosPuntos ? 0 : 2,
          }))
        },
        options: {
          plugins: {
            legend: {
              display: true,
              labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 } }
            }
          },
          scales: {
            x: { ticks: { color: '#64748b', maxTicksLimit: 6 }, grid: { color: '#1e293b' } },
            y: { min: 0, max: 100, ticks: { color: '#64748b' }, grid: { color: '#334155' } }
          }
        }
      });
    }

    document.getElementById('footer').textContent =
      `Actualizado: ${new Date().toLocaleTimeString('es-ES')} · refresca cada 30s`;

  } catch(e) {
    document.getElementById('footer').textContent = 'Error al cargar datos';
  }
}

async function leerModoDebug() {
  try {
    const res = await fetch(`https://api.thingspeak.com/channels/${CONTROL_CHANNEL}/fields/1/last.json`);
    const data = await res.json();
    return data.field1 === '1';
  } catch { return false; }
}

async function toggleDebug() {
  const btn = document.getElementById('debugBtn');
  const esDebug = btn.classList.contains('active');
  const nuevoValor = esDebug ? 0 : 1;
  btn.textContent = '⏳ Cambiando...';
  btn.disabled = true;
  let ok = false;
  for (let i = 0; i < 4; i++) {
    try {
      const res = await fetch(`https://api.thingspeak.com/update?api_key=${CONTROL_KEY}&field1=${nuevoValor}`);
      const txt = await res.text();
      if (txt.trim() !== '0') { ok = true; break; }
    } catch {}
    await new Promise(r => setTimeout(r, 4000));
  }
  setDebugUI(ok ? !esDebug : esDebug);
  btn.disabled = false;
}

function setDebugUI(debug) {
  const btn = document.getElementById('debugBtn');
  const label = document.getElementById('debugLabel');
  if (debug) {
    btn.textContent = 'Desactivar debug';
    btn.classList.add('active');
    label.textContent = '🐛 Modo debug · medición cada 5 seg';
  } else {
    btn.textContent = 'Activar debug';
    btn.classList.remove('active');
    label.textContent = 'Modo normal · medición cada 5 min';
  }
}

leerModoDebug().then(setDebugUI);

actualizar();
setInterval(actualizar, 30000);
</script>
</body>
</html>
